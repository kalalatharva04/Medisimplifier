<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Medisimplifier AI</title>

<style>
body{margin:0;font-family:Arial;background:#f4f8fb}
header{background:#2b7cff;color:white;text-align:center;padding:15px}
.container{max-width:600px;margin:auto;padding:15px}
.card{background:white;padding:15px;margin:10px 0;border-radius:10px;box-shadow:0 2px 8px rgba(0,0,0,0.1)}
input{width:100%;padding:10px;margin:5px 0;border-radius:6px;border:1px solid #ccc}
button{width:100%;padding:10px;background:#2b7cff;color:white;border:none;border-radius:6px;margin-top:5px;cursor:pointer}
.hidden{display:none}
.chat-box{height:300px;overflow-y:auto;border:1px solid #ddd;padding:10px;border-radius:6px}
.msg{margin:5px 0}
</style>
</head>

<body>

<header>
<h2>Medisimplifier 🤖</h2>
<p>AI Healthcare Assistant</p>
</header>

<div class="container" id="loginPage">
  <div class="card">
    <h3>Login / Signup</h3>
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button onclick="signup()">Sign Up</button>
    <button onclick="login()">Login</button>
  </div>
</div>

<div class="container hidden" id="dashboard">
  <div class="card" onclick="openChat()">🤖 Open AI Assistant</div>
  <button onclick="logout()">Logout</button>
</div>

<div class="container hidden" id="chatPage">
  <div class="card">
    <h3>AI Health Assistant</h3>
    <div id="chatBox" class="chat-box"></div>
    <input id="chatInput" placeholder="Ask your health question...">
    <button onclick="sendMessage()">Send</button>
    <button onclick="goBack()">Back</button>
  </div>
</div>

<script>
function signup(){
  const e = email.value;
  const p = password.value;
  if(!e || !p){ alert("Fill all fields"); return; }
  localStorage.setItem("user", JSON.stringify({email:e,password:p}));
  alert("Signup successful! Now login.");
}

function login(){
  const e = email.value;
  const p = password.value;
  const user = JSON.parse(localStorage.getItem("user"));
  if(user && user.email === e && user.password === p){
    loginPage.classList.add('hidden');
    dashboard.classList.remove('hidden');
  } else {
    alert("Invalid credentials");
  }
}

function logout(){
  dashboard.classList.add('hidden');
  loginPage.classList.remove('hidden');
}

function openChat(){
  dashboard.classList.add('hidden');
  chatPage.classList.remove('hidden');
}

function goBack(){
  chatPage.classList.add('hidden');
  dashboard.classList.remove('hidden');
}

async function sendMessage(){
  const msg = chatInput.value;
  if(!msg) return;
  chatBox.innerHTML += `<div class='msg'><b>You:</b> ${msg}</div>`;
  try{
    const response = await fetch("https://api.openai.com/v1/chat/completions",{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "Authorization":"Bearer YOUR_OPENAI_API_KEY"
      },
      body: JSON.stringify({
        model: "gpt-4o-mini",
        messages:[{role:"user",content:msg}]
      })
    });
    const data = await response.json();
    const reply = data.choices?.[0]?.message?.content || "No response";
    chatBox.innerHTML += `<div class='msg'><b>AI:</b> ${reply}</div>`;
    chatInput.value='';
  }catch(err){
    chatBox.innerHTML += `<div class='msg'><b>AI:</b> Error connecting</div>`;
  }
}
</script>

</body>
</html>
